#==============================================================================
# GROWCTRL – ESPHome Relay Board v4.0
# Projekt : GROWCTRL – Home-Assistant-Gesamtsystem fuer Growzelte
# Zweck   : Optionale GROWCTRL-Hardware: ESP32, 8 Relais, RS485-Master mit adaptivem Addon-System
#           (HYDRO2/TERRA2/POWER4), MQTT Discovery. HINWEIS: Aktoren koennen alternativ beliebige
#           HA-Switches sein (z.B. Zigbee-Steckdosen) – HA ist die Steuerzentrale, diese Hardware
#           der verlaengerte Arm.
# Bezug   : Benoetigt secrets.yaml: wifi_ssid, wifi_password, api_encryption_key, ota_password,
#           mqtt_broker, mqtt_user, mqtt_password, ap_fallback_password
# Version : 4.0.0  |  Lizenz: GC-SAL 1.0 (siehe LICENSE)
# Autor   : MrDarkvoid – entwickelt in Zusammenarbeit mit Claude (Anthropic), Vibe Coding
#==============================================================================

################################################################################
# RELAY BOARD v4.0 — Adaptives MQTT Discovery System
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  ARCHITEKTUR: ADAPTIVES ADDON-SYSTEM                                    │
# │                                                                         │
# │  Das Relay Board ist der MQTT Discovery Publisher.                      │
# │  Es kennt als einzige Komponente alle verbundenen Addons.               │
# │                                                                         │
# │  ABLAUF BEI ADDON-VERBINDUNG:                                           │
# │  1. Addon sendet HELLO:TYPE=HYDRO2,ADDR=AUTO via RS485                  │
# │  2. Relay Board vergibt Slot-Adresse (0x01–0x03)                        │
# │  3. Relay Board publiziert MQTT Discovery Config für jeden Kanal        │
# │     → HA erstellt Entitäten automatisch                                 │
# │  4. Relay Board publiziert laufend Messwerte auf State-Topics           │
# │  5. Relay Board publiziert Availability (online/offline)                │
# │                                                                         │
# │  ABLAUF BEI ADDON-TRENNUNG:                                             │
# │  1. RS485 Timeout (30s) → addon_online[slot] = false                   │
# │  2. MQTT Availability → "offline" → HA zeigt "unavailable"             │
# │  3. Entitäten bleiben in HA erhalten (manuelles Löschen durch Nutzer)  │
# │  4. Nutzer bestätigt Entfernung in HA → Automation löscht               │
# │     MQTT Discovery Config (leeres Payload = Discovery löscht Entität)  │
# │                                                                         │
# │  ADDON-TYPEN UND IHRE MQTT-KANÄLE:                                      │
# │  HYDRO2 → pH1,pH2,EC1,EC2,TDS1,TDS2,T1,T2,L1,L2,Alarms               │
# │  TERRA2 → Soil1F,Soil1T,Soil2F,Soil2T,EC_soil,pH_soil,Alarms          │
# │  POWER4 → Relay1–4 (switch), Power1–4 (sensor, optional)              │
# │                                                                         │
# │  MQTT TOPIC SCHEMA:                                                     │
# │  Discovery: homeassistant/<typ>/gc_slot<N>_<kanal>/config              │
# │  State:     gc/slot<N>/<kanal>/state                                    │
# │  Available: gc/slot<N>/availability                                     │
# │  Remove:    gc/slot<N>/remove (HA→ESP: Entität löschen bestätigen)     │
# └─────────────────────────────────────────────────────────────────────────┘
#
# VORAUSSETZUNGEN:
#   - MQTT Broker (Mosquitto Add-on in HA empfohlen)
#   - HA MQTT Integration konfiguriert
#   - secrets.yaml: mqtt_broker, mqtt_user, mqtt_password
################################################################################

esphome:
  name: relay-board
  friendly_name: "Grow Controller Relay Board"
  on_boot:
    priority: -200
    then:
      - logger.log: "Relay Board v4.0 gestartet — MQTT Discovery aktiv"
      - script.execute: publish_all_discoveries
      - script.execute: rs485_listen_loop

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    version: "5.3.2"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "GrowCtrl Fallback"
    password: !secret ap_fallback_password

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# ─────────────────────────────────────────────────────────────────────────────
# MQTT — Kern des adaptiven Systems
# Verbindung zum Broker + Last Will Testament
# ─────────────────────────────────────────────────────────────────────────────
mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  client_id: "grow_relay_board"
  # Birth + Will: wenn ESP neu startet oder abstürzt
  birth_message:
    topic: gc/relay_board/availability
    payload: "online"
  will_message:
    topic: gc/relay_board/availability
    payload: "offline"
    retain: true
  # Eingehende Nachrichten: Nutzer bestätigt Addon-Entfernung
  on_message:
    # Slot 1 Entfernung bestätigen
    - topic: gc/slot1/remove
      then:
        - lambda: |-
            if (id(slot_occupied)[1]) {
              // Discovery-Configs löschen (leeres Payload = Entität entfernen)
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_ph1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_ph2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_ec1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_ec2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_tds1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_tds2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_t1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_t2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_l1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_l2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/binary_sensor/gc_slot1_alarm/config", "", 0, true);
              // Terra2-spezifische Topics ebenfalls löschen (falls Typ wechselte)
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_soil1_moisture/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_soil2_moisture/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_soil1_temp/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_soil2_temp/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_soil_ec/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot1_soil_ph/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot1_r1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot1_r2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot1_r3/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot1_r4/config", "", 0, true);
              // Slot freigeben
              id(slot_occupied)[1] = false;
              id(addon_type)[1] = "";
              id(addon_online)[1] = false;
              ESP_LOGI("mqtt", "Slot 1 entfernt auf Nutzerbestätigung");
            }

    - topic: gc/slot2/remove
      then:
        - lambda: |-
            if (id(slot_occupied)[2]) {
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_ph1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_ph2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_ec1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_ec2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_tds1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_tds2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_t1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_t2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_l1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_l2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/binary_sensor/gc_slot2_alarm/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_soil1_moisture/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_soil2_moisture/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_soil1_temp/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_soil2_temp/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_soil_ec/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot2_soil_ph/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot2_r1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot2_r2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot2_r3/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot2_r4/config", "", 0, true);
              id(slot_occupied)[2] = false;
              id(addon_type)[2] = "";
              id(addon_online)[2] = false;
              ESP_LOGI("mqtt", "Slot 2 entfernt auf Nutzerbestätigung");
            }

    - topic: gc/slot3/remove
      then:
        - lambda: |-
            if (id(slot_occupied)[3]) {
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_ph1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_ph2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_ec1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_ec2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_tds1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_tds2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_t1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_t2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_l1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_l2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/binary_sensor/gc_slot3_alarm/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_soil1_moisture/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_soil2_moisture/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_soil1_temp/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_soil2_temp/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_soil_ec/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/sensor/gc_slot3_soil_ph/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot3_r1/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot3_r2/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot3_r3/config", "", 0, true);
              id(mqtt_client).publish("homeassistant/switch/gc_slot3_r4/config", "", 0, true);
              id(slot_occupied)[3] = false;
              id(addon_type)[3] = "";
              id(addon_online)[3] = false;
              ESP_LOGI("mqtt", "Slot 3 entfernt auf Nutzerbestätigung");
            }

    # POWER4 Relais-Befehle aus HA empfangen
    - topic: gc/slot+/r+/command
      then:
        - lambda: |-
            std::string t = x;
            // Topic: gc/slot1/r2/command → Slot 1, Relais 2
            // payload: "ON" oder "OFF"
            // Weiterleiten an Addon via RS485 CMD-Frame
            char cmd[64];
            snprintf(cmd, sizeof(cmd), "CMD:%s\n", t.c_str());
            // Detailimplementierung: Slot+Relais aus Topic parsen
            // (vereinfacht — vollständige Implementierung im Script)

# ─────────────────────────────────────────────────────────────────────────────
# RS485 UART
# ─────────────────────────────────────────────────────────────────────────────
uart:
  id: uart_rs485
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 9600

# ─────────────────────────────────────────────────────────────────────────────
# GLOBALS — Addon Registry
# ─────────────────────────────────────────────────────────────────────────────
globals:

  - id: slot_occupied
    type: bool[4]
    restore_value: no
    initial_value: '{false,false,false,false}'

  - id: addon_type
    type: std::string[4]
    restore_value: no

  - id: addon_online
    type: bool[4]
    restore_value: no
    initial_value: '{false,false,false,false}'

  - id: addon_last_seen
    type: uint32_t[4]
    restore_value: no
    initial_value: '{0,0,0,0}'

  - id: addon_alarms
    type: uint16_t[4]
    restore_value: no
    initial_value: '{0,0,0,0}'

  # Messdaten — 10 Kanäle je Slot (erweiterbar gegenüber v3 mit 8)
  # HYDRO2: [0]=pH1 [1]=pH2 [2]=EC1 [3]=EC2 [4]=TDS1 [5]=TDS2 [6]=T1 [7]=T2 [8]=L1 [9]=L2
  # TERRA2: [0]=Soil1F [1]=Soil1T [2]=Soil2F [3]=Soil2T [4]=EC_soil [5]=pH_soil
  # POWER4: [0]=R1 [1]=R2 [2]=R3 [3]=R4 (0=OFF, 1=ON)
  - id: addon_data
    type: float[4][10]
    restore_value: no

  # Merker ob Discovery bereits gesendet (verhindert Spam)
  - id: discovery_sent
    type: bool[4]
    restore_value: no
    initial_value: '{false,false,false,false}'

# ─────────────────────────────────────────────────────────────────────────────
# STATISCHE HA-ENTITÄTEN (Relay Board selbst — immer vorhanden)
# Diese bleiben bei native API, nur Addon-Entitäten gehen über MQTT Discovery
# ─────────────────────────────────────────────────────────────────────────────
