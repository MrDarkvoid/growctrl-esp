    name: "Sensor Node Temperatur"
    id: remote_aht_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    icon: mdi:thermometer

  - platform: template
    name: "Sensor Node Luftfeuchte"
    id: remote_aht_hum
    unit_of_measurement: "%"
    accuracy_decimals: 1
    device_class: humidity
    state_class: measurement
    icon: mdi:water-percent

  - platform: template
    name: "Sensor Node CO2"
    id: remote_eco2
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    device_class: carbon_dioxide
    state_class: measurement
    icon: mdi:molecule-co2

  - platform: template
    name: "Sensor Node TVOC"
    id: remote_tvoc
    unit_of_measurement: "ppb"
    accuracy_decimals: 0
    state_class: measurement
    icon: mdi:air-filter

  - platform: template
    name: "Sensor Node Lux"
    id: remote_lux
    unit_of_measurement: "lx"
    accuracy_decimals: 0
    device_class: illuminance
    state_class: measurement
    icon: mdi:white-balance-sunny

  - platform: template
    name: "Sensor Node DS18B20 1"
    id: remote_ds1
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    icon: mdi:thermometer-water

  - platform: template
    name: "Sensor Node DS18B20 2"
    id: remote_ds2
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    icon: mdi:thermometer-water

  # Addon Registry Übersicht (für HA Dashboard)
  - platform: template
    name: "Addon Registry Slot 1"
    id: ts_addon1_type
    icon: mdi:puzzle

  - platform: template
    name: "Addon Registry Slot 2"
    id: ts_addon2_type
    icon: mdi:puzzle

  - platform: template
    name: "Addon Registry Slot 3"
    id: ts_addon3_type
    icon: mdi:puzzle

  - platform: template
    name: "Addon Übersicht"
    id: ts_addon_overview
    icon: mdi:view-grid

# Relais (8× native Entitäten — immer vorhanden)
switch:
  - platform: gpio
    name: "Relais 1 — Licht"
    id: relay_1
    pin:
      number: GPIO32
      inverted: true
    icon: mdi:lightbulb

  - platform: gpio
    name: "Relais 2 — Heizung"
    id: relay_2
    pin:
      number: GPIO33
      inverted: true
    icon: mdi:radiator

  - platform: gpio
    name: "Relais 3 — CO2 Ventil"
    id: relay_3
    pin:
      number: GPIO25
      inverted: true
    icon: mdi:molecule-co2

  - platform: gpio
    name: "Relais 4 — Pumpe"
    id: relay_4
    pin:
      number: GPIO26
      inverted: true
    icon: mdi:pump

  - platform: gpio
    name: "Relais 5 — Lüfter"
    id: relay_5
    pin:
      number: GPIO27
      inverted: true
    icon: mdi:fan

  - platform: gpio
    name: "Relais 6 — Reserve"
    id: relay_6
    pin:
      number: GPIO14
      inverted: true
    icon: mdi:power-socket-de

  - platform: gpio
    name: "Relais 7 — Reserve"
    id: relay_7
    pin:
      number: GPIO12
      inverted: true
    icon: mdi:power-socket-de

  - platform: gpio
    name: "Relais 8 — Reserve"
    id: relay_8
    pin:
      number: GPIO13
      inverted: true
    icon: mdi:power-socket-de

# DE/RE Pin für RS485
output:
  - platform: gpio
    id: rs485_de
    pin: GPIO4

# ─────────────────────────────────────────────────────────────────────────────
# SCRIPTS — Kern des adaptiven Systems
# ─────────────────────────────────────────────────────────────────────────────
script:

  # ══════════════════════════════════════════════════════════════════════════
  # SCRIPT: publish_discovery_hydro2
  # Publiziert MQTT Discovery Config für einen HYDRO2-Slot
  # Aufgerufen wenn HELLO:TYPE=HYDRO2 empfangen wird
  #
  # MQTT Discovery Format (HA Spec):
  # Topic:   homeassistant/<component>/<object_id>/config
  # Payload: JSON mit name, state_topic, unit, device_class, availability...
  #
  # WARUM RETAIN=true?
  # Wenn HA neu startet, liest es alle retained Discovery-Messages erneut.
  # So bleiben die Entitäten auch nach HA-Neustart erhalten.
  # ══════════════════════════════════════════════════════════════════════════
  - id: publish_discovery_hydro2
    parameters:
      slot: int
    then:
      - lambda: |-
          // Slot-spezifische Strings aufbauen
          char s[4]; snprintf(s, sizeof(s), "%d", slot);
          char slot_name[32];
          // Labeling: "HYDRO2 - Addon 1", "HYDRO2 - Addon 2", etc.
          snprintf(slot_name, sizeof(slot_name), "HYDRO2 - Addon %d", slot);

          // Availability Topic (shared für alle Kanäle dieses Slots)
          char avail[48];
          snprintf(avail, sizeof(avail), "gc/slot%d/availability", slot);

          // Device-Info (gruppiert alle Addon-Entitäten in HA unter einem Gerät)
          char device[256];
          snprintf(device, sizeof(device),
            "\"device\":{\"identifiers\":[\"gc_slot%d_hydro2\"],"
            "\"name\":\"%s\","
            "\"model\":\"HYDRO2 v2.0\","
            "\"manufacturer\":\"GrowCtrl\","
            "\"via_device\":\"grow_relay_board\"}",
            slot, slot_name);

          // ─────────────────────────────────────────────
          // HELPER MACRO: Discovery für einen Sensor-Kanal
          // Publiziert Config + setzt retain=true
          // ─────────────────────────────────────────────
          auto pub = [&](const char* component, const char* kanal,
                         const char* name, const char* unit,
                         const char* dev_class, const char* icon,
                         const char* state_class = "measurement") {

            char topic[96];
            snprintf(topic, sizeof(topic),
              "homeassistant/%s/gc_slot%d_%s/config",
              component, slot, kanal);

            char state_topic[64];
            snprintf(state_topic, sizeof(state_topic),
              "gc/slot%d/%s/state", slot, kanal);

            char payload[512];
            if (strcmp(component, "sensor") == 0) {
              snprintf(payload, sizeof(payload),
                "{"
                "\"name\":\"%s\","
                "\"unique_id\":\"gc_slot%d_%s\","
                "\"state_topic\":\"%s\","
                "\"unit_of_measurement\":\"%s\","
                "%s"  // device_class (optional)
                "\"icon\":\"%s\","
                "\"state_class\":\"%s\","
                "\"availability_topic\":\"%s\","
                "\"payload_available\":\"online\","
                "\"payload_not_available\":\"offline\","
                "%s"  // device
                "}",
                name, slot, kanal, state_topic, unit,
                strlen(dev_class) > 0 ?
                  (std::string("\"device_class\":\"") + dev_class + "\",").c_str() : "",
                icon, state_class, avail, device);
            } else if (strcmp(component, "binary_sensor") == 0) {
              snprintf(payload, sizeof(payload),
                "{"
                "\"name\":\"%s\","
                "\"unique_id\":\"gc_slot%d_%s\","
                "\"state_topic\":\"%s\","
                "\"payload_on\":\"ON\","
                "\"payload_off\":\"OFF\","
                "\"device_class\":\"problem\","
                "\"icon\":\"%s\","
                "\"availability_topic\":\"%s\","
                "%s"
                "}",
                name, slot, kanal, state_topic, icon, avail, device);
            }

            id(mqtt_client).publish(topic, payload, 0, true);
            ESP_LOGD("discovery", "Published: %s", topic);
          };

          // ─────────────────────────────────────────────
          // HYDRO2 Kanäle publizieren
          // pH Sensoren
          pub("sensor", "ph1",  (std::string(slot_name)+" pH 1").c_str(),
              "pH", "", "mdi:ph");
          pub("sensor", "ph2",  (std::string(slot_name)+" pH 2").c_str(),
              "pH", "", "mdi:ph");
          // EC Sensoren
          pub("sensor", "ec1",  (std::string(slot_name)+" EC 1").c_str(),
              "mS/cm", "", "mdi:lightning-bolt");
          pub("sensor", "ec2",  (std::string(slot_name)+" EC 2").c_str(),
              "mS/cm", "", "mdi:lightning-bolt");
          // TDS Sensoren
          pub("sensor", "tds1", (std::string(slot_name)+" TDS 1").c_str(),
              "ppm", "", "mdi:water-percent");
          pub("sensor", "tds2", (std::string(slot_name)+" TDS 2").c_str(),
              "ppm", "", "mdi:water-percent");
          // Temperaturen
          pub("sensor", "t1",   (std::string(slot_name)+" Wassertemp 1").c_str(),
              "°C", "temperature", "mdi:thermometer-water");
          pub("sensor", "t2",   (std::string(slot_name)+" Wassertemp 2").c_str(),
              "°C", "temperature", "mdi:thermometer-water");
          // Füllstand
          pub("sensor", "l1",   (std::string(slot_name)+" Füllstand Tank 1").c_str(),
              "%", "", "mdi:gauge");
          pub("sensor", "l2",   (std::string(slot_name)+" Füllstand Tank 2").c_str(),
              "%", "", "mdi:gauge");
          // Alarm
          pub("binary_sensor", "alarm",
              (std::string(slot_name)+" Alarm").c_str(),
              "", "problem", "mdi:alert-circle");

          // Availability auf online setzen
          id(mqtt_client).publish(avail, "online", 0, true);

          id(discovery_sent)[slot] = true;
          ESP_LOGI("discovery", "HYDRO2 Slot %d Discovery publiziert — %s", slot, slot_name);

  # ══════════════════════════════════════════════════════════════════════════
  # SCRIPT: publish_discovery_terra2
  # TERRA2: Bodenfeuchte × 2, Bodentemperatur × 2, EC Boden, pH Boden
  # ══════════════════════════════════════════════════════════════════════════
  - id: publish_discovery_terra2
    parameters:
      slot: int
    then:
      - lambda: |-
          char slot_name[32];
          snprintf(slot_name, sizeof(slot_name), "TERRA2 - Addon %d", slot);
          char avail[48];
          snprintf(avail, sizeof(avail), "gc/slot%d/availability", slot);
          char device[256];
          snprintf(device, sizeof(device),
            "\"device\":{\"identifiers\":[\"gc_slot%d_terra2\"],"
            "\"name\":\"%s\","
            "\"model\":\"TERRA2 v1.0\","
            "\"manufacturer\":\"GrowCtrl\","
            "\"via_device\":\"grow_relay_board\"}",
            slot, slot_name);

          auto pub = [&](const char* kanal, const char* name,
                         const char* unit, const char* dev_class,
                         const char* icon) {
            char config_topic[96];
            snprintf(config_topic, sizeof(config_topic),
              "homeassistant/sensor/gc_slot%d_%s/config", slot, kanal);
            char state_topic[64];
            snprintf(state_topic, sizeof(state_topic),
              "gc/slot%d/%s/state", slot, kanal);
            char payload[512];
            snprintf(payload, sizeof(payload),
              "{"
              "\"name\":\"%s\","
              "\"unique_id\":\"gc_slot%d_%s\","
              "\"state_topic\":\"%s\","
              "\"unit_of_measurement\":\"%s\","
              "%s"
              "\"icon\":\"%s\","
              "\"state_class\":\"measurement\","
              "\"availability_topic\":\"%s\","
              "\"payload_available\":\"online\","
              "\"payload_not_available\":\"offline\","
              "%s"
              "}",
              name, slot, kanal, state_topic, unit,
              strlen(dev_class) > 0 ?
                (std::string("\"device_class\":\"") + dev_class + "\",").c_str() : "",
              icon, avail, device);
            id(mqtt_client).publish(config_topic, payload, 0, true);
          };

          pub("soil1_moisture", (std::string(slot_name)+" Bodenfeuchte 1").c_str(),
              "%", "moisture", "mdi:water-percent");
          pub("soil2_moisture", (std::string(slot_name)+" Bodenfeuchte 2").c_str(),
              "%", "moisture", "mdi:water-percent");
          pub("soil1_temp",     (std::string(slot_name)+" Bodentemperatur 1").c_str(),
              "°C", "temperature", "mdi:thermometer");
          pub("soil2_temp",     (std::string(slot_name)+" Bodentemperatur 2").c_str(),
              "°C", "temperature", "mdi:thermometer");
          pub("soil_ec",        (std::string(slot_name)+" EC Boden").c_str(),
              "mS/cm", "", "mdi:lightning-bolt");
          pub("soil_ph",        (std::string(slot_name)+" pH Boden").c_str(),
              "pH", "", "mdi:ph");

          // Alarm als binary_sensor
          char alarm_cfg[96], alarm_state[64], alarm_payload[400];
          snprintf(alarm_cfg, sizeof(alarm_cfg),
            "homeassistant/binary_sensor/gc_slot%d_alarm/config", slot);
          snprintf(alarm_state, sizeof(alarm_state),
            "gc/slot%d/alarm/state", slot);
          snprintf(alarm_payload, sizeof(alarm_payload),
            "{\"name\":\"%s Alarm\",\"unique_id\":\"gc_slot%d_alarm\","
            "\"state_topic\":\"%s\",\"payload_on\":\"ON\",\"payload_off\":\"OFF\","
            "\"device_class\":\"problem\",\"icon\":\"mdi:alert-circle\","
            "\"availability_topic\":\"%s\",%s}",
            slot_name, slot, alarm_state, avail, device);
          id(mqtt_client).publish(alarm_cfg, alarm_payload, 0, true);

          id(mqtt_client).publish(avail, "online", 0, true);
          id(discovery_sent)[slot] = true;
          ESP_LOGI("discovery", "TERRA2 Slot %d Discovery publiziert", slot);

  # ══════════════════════════════════════════════════════════════════════════
  # SCRIPT: publish_discovery_power4
  # POWER4: 4× Switch (Steckdose), optional 4× Leistungsmessung
  # Switch-Discovery: component = "switch" mit command_topic
  # ══════════════════════════════════════════════════════════════════════════
  - id: publish_discovery_power4
    parameters:
      slot: int
    then:
      - lambda: |-
          char slot_name[32];
          snprintf(slot_name, sizeof(slot_name), "POWER4 - Addon %d", slot);
          char avail[48];
          snprintf(avail, sizeof(avail), "gc/slot%d/availability", slot);
          char device[256];
          snprintf(device, sizeof(device),
            "\"device\":{\"identifiers\":[\"gc_slot%d_power4\"],"
            "\"name\":\"%s\","
            "\"model\":\"POWER4 v1.0\","
            "\"manufacturer\":\"GrowCtrl\","
            "\"via_device\":\"grow_relay_board\"}",
            slot, slot_name);

          for (int r = 1; r <= 4; r++) {
            char kanal[8], rname[48];
            snprintf(kanal, sizeof(kanal), "r%d", r);
            snprintf(rname, sizeof(rname), "%s Steckdose %d", slot_name, r);

            char config_topic[96], state_topic[64], cmd_topic[64];
            snprintf(config_topic, sizeof(config_topic),
              "homeassistant/switch/gc_slot%d_%s/config", slot, kanal);
            snprintf(state_topic, sizeof(state_topic),
              "gc/slot%d/%s/state", slot, kanal);
            snprintf(cmd_topic, sizeof(cmd_topic),
              "gc/slot%d/%s/command", slot, kanal);

            char payload[512];
            snprintf(payload, sizeof(payload),
              "{"
              "\"name\":\"%s\","
              "\"unique_id\":\"gc_slot%d_%s\","
              "\"state_topic\":\"%s\","
              "\"command_topic\":\"%s\","
              "\"payload_on\":\"ON\","
              "\"payload_off\":\"OFF\","
              "\"icon\":\"mdi:power-socket-de\","
              "\"availability_topic\":\"%s\","
              "\"payload_available\":\"online\","
              "\"payload_not_available\":\"offline\","
              "%s"
              "}",
              rname, slot, kanal, state_topic, cmd_topic, avail, device);

            id(mqtt_client).publish(config_topic, payload, 0, true);
          }

          id(mqtt_client).publish(avail, "online", 0, true);
          id(discovery_sent)[slot] = true;
          ESP_LOGI("discovery", "POWER4 Slot %d Discovery publiziert", slot);

  # ══════════════════════════════════════════════════════════════════════════
  # SCRIPT: publish_slot_state
  # Publiziert Messwerte eines Slots auf die entsprechenden State-Topics
  # Wird nach jedem ADATA-Frame aufgerufen
  # ══════════════════════════════════════════════════════════════════════════
  - id: publish_slot_state
    parameters:
      slot: int
    then:
      - lambda: |-
          std::string type = id(addon_type)[slot];
          char buf[32];

          if (type == "HYDRO2") {
            // pH1
            char t[64];
            snprintf(t, sizeof(t), "gc/slot%d/ph1/state", slot);
            if (isnan(id(addon_data)[slot][0])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.2f", id(addon_data)[slot][0]); id(mqtt_client).publish(t, buf); }
            // pH2
            snprintf(t, sizeof(t), "gc/slot%d/ph2/state", slot);
            if (isnan(id(addon_data)[slot][1])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.2f", id(addon_data)[slot][1]); id(mqtt_client).publish(t, buf); }
            // EC1
            snprintf(t, sizeof(t), "gc/slot%d/ec1/state", slot);
            if (isnan(id(addon_data)[slot][2])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.2f", id(addon_data)[slot][2]); id(mqtt_client).publish(t, buf); }
            // EC2
            snprintf(t, sizeof(t), "gc/slot%d/ec2/state", slot);
            if (isnan(id(addon_data)[slot][3])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.2f", id(addon_data)[slot][3]); id(mqtt_client).publish(t, buf); }
            // TDS1
            snprintf(t, sizeof(t), "gc/slot%d/tds1/state", slot);
            if (isnan(id(addon_data)[slot][4])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.0f", id(addon_data)[slot][4]); id(mqtt_client).publish(t, buf); }
            // TDS2
            snprintf(t, sizeof(t), "gc/slot%d/tds2/state", slot);
            if (isnan(id(addon_data)[slot][5])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.0f", id(addon_data)[slot][5]); id(mqtt_client).publish(t, buf); }
            // T1
            snprintf(t, sizeof(t), "gc/slot%d/t1/state", slot);
            if (isnan(id(addon_data)[slot][6])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.1f", id(addon_data)[slot][6]); id(mqtt_client).publish(t, buf); }
            // T2
            snprintf(t, sizeof(t), "gc/slot%d/t2/state", slot);
            if (isnan(id(addon_data)[slot][7])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.1f", id(addon_data)[slot][7]); id(mqtt_client).publish(t, buf); }
            // L1
            snprintf(t, sizeof(t), "gc/slot%d/l1/state", slot);
            if (isnan(id(addon_data)[slot][8])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.0f", id(addon_data)[slot][8]); id(mqtt_client).publish(t, buf); }
            // L2
            snprintf(t, sizeof(t), "gc/slot%d/l2/state", slot);
            if (isnan(id(addon_data)[slot][9])) id(mqtt_client).publish(t, "unavailable");
            else { snprintf(buf, sizeof(buf), "%.0f", id(addon_data)[slot][9]); id(mqtt_client).publish(t, buf); }
            // Alarm
            snprintf(t, sizeof(t), "gc/slot%d/alarm/state", slot);
            id(mqtt_client).publish(t, id(addon_alarms)[slot] > 0 ? "ON" : "OFF");

          } else if (type == "TERRA2") {
            char t[64];
            const char* channels[] = {"soil1_moisture","soil1_temp",
                                       "soil2_moisture","soil2_temp",
                                       "soil_ec","soil_ph"};
            const char* fmts[]     = {"%.1f","%.1f","%.1f","%.1f","%.2f","%.2f"};
            for (int i = 0; i < 6; i++) {
              snprintf(t, sizeof(t), "gc/slot%d/%s/state", slot, channels[i]);
              if (isnan(id(addon_data)[slot][i])) id(mqtt_client).publish(t, "unavailable");
              else {
                snprintf(buf, sizeof(buf), fmts[i], id(addon_data)[slot][i]);
                id(mqtt_client).publish(t, buf);
              }
            }
            snprintf(t, sizeof(t), "gc/slot%d/alarm/state", slot);
            id(mqtt_client).publish(t, id(addon_alarms)[slot] > 0 ? "ON" : "OFF");

          } else if (type == "POWER4") {
            for (int r = 1; r <= 4; r++) {
              char t[64];
              snprintf(t, sizeof(t), "gc/slot%d/r%d/state", slot, r);
              id(mqtt_client).publish(t,
                id(addon_data)[slot][r-1] > 0.5f ? "ON" : "OFF");
            }
          }

  # ══════════════════════════════════════════════════════════════════════════
  # SCRIPT: publish_all_discoveries
  # Beim Boot: alle belegten Slots erneut publizieren (retained Topics
  # übernehmen das nach HA-Neustart automatisch, aber nach ESP-Neustart
  # müssen die States neu geschrieben werden)
  # ══════════════════════════════════════════════════════════════════════════
  - id: publish_all_discoveries
    then:
      - lambda: |-
          for (int s = 1; s <= 3; s++) {
            if (id(slot_occupied)[s] && !id(addon_type)[s].empty()) {
              id(discovery_sent)[s] = false; // Erzwingt erneutes Senden
            }
          }

  # ══════════════════════════════════════════════════════════════════════════
  # SCRIPT: rs485_listen_loop
  # Haupt-Loop: RS485 Daten einlesen und verarbeiten
  # ══════════════════════════════════════════════════════════════════════════
  - id: rs485_listen_loop
    then:
      - logger.log: "RS485 Listen Loop gestartet"

# ─────────────────────────────────────────────────────────────────────────────
# INTERVAL TASKS
# ─────────────────────────────────────────────────────────────────────────────
interval:

  # ── RS485 Daten lesen + verarbeiten ────────────────────────────────────────
  - interval: 50ms
    then:
      - lambda: |-
          static std::string buf;
          while (id(uart_rs485).available()) {
            char c;
            id(uart_rs485).read_byte((uint8_t*)&c);
            if (c == '\n') {
              if (buf.empty()) continue;

              // ════════════════════════════════════
              // HELLO-Frame: Addon Discovery
              // Format: HELLO:TYPE=HYDRO2,ADDR=AUTO,...
              // ════════════════════════════════════
              if (buf.substr(0,6) == "HELLO:") {
                auto tp = buf.find("TYPE=");
                if (tp == std::string::npos) { buf.clear(); continue; }
                auto te = buf.find(",", tp);
                std::string type = buf.substr(tp+5, te-tp-5);

                // Freien Slot suchen
                int free_slot = -1;
                for (int s = 1; s <= 3; s++) {
                  if (!id(slot_occupied)[s]) { free_slot = s; break; }
                }
                if (free_slot == -1) {
                  ESP_LOGW("discovery", "Alle 3 Slots belegt — HELLO ignoriert");
                  buf.clear(); continue;
                }

                // Slot belegen
                id(slot_occupied)[free_slot] = true;
                id(addon_type)[free_slot] = type;
                id(addon_online)[free_slot] = true;
                id(addon_last_seen)[free_slot] = millis();
                id(discovery_sent)[free_slot] = false;

                // ACK senden
                id(rs485_de).turn_on();
                delay(3);
                char ack[64];
                snprintf(ack, sizeof(ack),
                  "ACK:ADDR=%02d,NAME=Slot%d,ASSIGNED\n",
                  free_slot, free_slot);
                id(uart_rs485).write_array((uint8_t*)ack, strlen(ack));
                id(uart_rs485).flush();
                delay(5);
                id(rs485_de).turn_off();

                ESP_LOGI("discovery",
                  "Addon erkannt: Typ=%s → Slot %d", type.c_str(), free_slot);

                // HA Registry aktualisieren
                char label[32];
                snprintf(label, sizeof(label), "%s - Addon %d", type.c_str(), free_slot);
                if (free_slot==1) id(ts_addon1_type).publish_state(label);
                else if(free_slot==2) id(ts_addon2_type).publish_state(label);
                else if(free_slot==3) id(ts_addon3_type).publish_state(label);

                // MQTT Discovery sofort publizieren
                int s = free_slot;
                if (type == "HYDRO2")      id(publish_discovery_hydro2).execute(s);
                else if (type == "TERRA2") id(publish_discovery_terra2).execute(s);
                else if (type == "POWER4") id(publish_discovery_power4).execute(s);
                else {
                  ESP_LOGW("discovery",
                    "Unbekannter Addon-Typ: %s — kein Discovery", type.c_str());
                }
              }

              // ════════════════════════════════════
              // ADATA-Frame: Messwerte
              // HYDRO2: PH1,PH2,EC1,EC2,TDS1,TDS2,T1,T2,L1,L2,ALRM
              // TERRA2: S1F,S1T,S2F,S2T,ECB,PHB,ALRM
              // POWER4: R1,R2,R3,R4
              // ════════════════════════════════════
              else if (buf.substr(0,6) == "ADATA:") {
                auto ap = buf.find("ADDR=");
                if (ap == std::string::npos) { buf.clear(); continue; }
                int slot = std::stoi(buf.substr(ap+5, 2), nullptr, 16);
                if (slot < 1 || slot > 3) { buf.clear(); continue; }
                if (!id(slot_occupied)[slot]) { buf.clear(); continue; }

                id(addon_last_seen)[slot] = millis();
                id(addon_online)[slot] = true;

                auto parse_hex = [&](const char* key) -> uint16_t {
                  auto p = buf.find(key);
                  if (p == std::string::npos) return 0xFFFF;
                  return (uint16_t)std::stoi(buf.substr(p+strlen(key),4), nullptr, 16);
                };
                auto to_f = [](uint16_t r, float d=100.0f) -> float {
                  return r==0xFFFF ? NAN : r/d;
                };
                auto to_i = [](uint16_t r) -> float {
                  return r==0xFFFF ? NAN : (float)r;
                };

                std::string type = id(addon_type)[slot];

                if (type == "HYDRO2") {
                  id(addon_data)[slot][0] = to_f(parse_hex("PH1="));
                  id(addon_data)[slot][1] = to_f(parse_hex("PH2="));
                  id(addon_data)[slot][2] = to_f(parse_hex("EC1="));
                  id(addon_data)[slot][3] = to_f(parse_hex("EC2="));
                  id(addon_data)[slot][4] = to_i(parse_hex("TDS1="));
                  id(addon_data)[slot][5] = to_i(parse_hex("TDS2="));
                  id(addon_data)[slot][6] = to_f(parse_hex("T1="));
                  id(addon_data)[slot][7] = to_f(parse_hex("T2="));
                  id(addon_data)[slot][8] = to_i(parse_hex("L1="));
                  id(addon_data)[slot][9] = to_i(parse_hex("L2="));
                  id(addon_alarms)[slot]  = parse_hex("ALRM=");

                } else if (type == "TERRA2") {
                  id(addon_data)[slot][0] = to_f(parse_hex("S1F="), 10.0f); // % × 10
                  id(addon_data)[slot][1] = to_f(parse_hex("S1T="));
                  id(addon_data)[slot][2] = to_f(parse_hex("S2F="), 10.0f);
                  id(addon_data)[slot][3] = to_f(parse_hex("S2T="));
                  id(addon_data)[slot][4] = to_f(parse_hex("ECB="));
                  id(addon_data)[slot][5] = to_f(parse_hex("PHB="));
                  id(addon_alarms)[slot]  = parse_hex("ALRM=");

                } else if (type == "POWER4") {
                  // POWER4 sendet Relais-Status als einzelne Bits in STAT=
                  uint16_t stat = parse_hex("STAT=");
                  for (int r = 0; r < 4; r++)
                    id(addon_data)[slot][r] = (stat >> r) & 1 ? 1.0f : 0.0f;
                }

                // MQTT State Topics publizieren
                id(publish_slot_state).execute(slot);

                // Sensor Node SDATA Frame weiterleiten (Display)
                id(rs485_de).turn_on();
                delay(3);
                char fwd[256];
                if (type == "HYDRO2") {
                  snprintf(fwd, sizeof(fwd),
                    "SDATA:%d=%.2f|%.2f|%.2f|%.2f|%.0f|%.0f|%.1f|%.1f|%.0f|%.0f|%d\n",
                    slot,
                    isnan(id(addon_data)[slot][0])?-1.f:id(addon_data)[slot][0],
                    isnan(id(addon_data)[slot][1])?-1.f:id(addon_data)[slot][1],
                    isnan(id(addon_data)[slot][2])?-1.f:id(addon_data)[slot][2],
                    isnan(id(addon_data)[slot][3])?-1.f:id(addon_data)[slot][3],
                    isnan(id(addon_data)[slot][4])?-1.f:id(addon_data)[slot][4],
                    isnan(id(addon_data)[slot][5])?-1.f:id(addon_data)[slot][5],
                    isnan(id(addon_data)[slot][6])?-99.f:id(addon_data)[slot][6],
                    isnan(id(addon_data)[slot][7])?-99.f:id(addon_data)[slot][7],
                    isnan(id(addon_data)[slot][8])?-1.f:id(addon_data)[slot][8],
                    isnan(id(addon_data)[slot][9])?-1.f:id(addon_data)[slot][9],
                    id(addon_alarms)[slot]
                  );
                } else {
                  // TERRA2 + POWER4: eigenes SDATA-Format für Display
                  snprintf(fwd, sizeof(fwd),
                    "SDATA:%d=T2|%.1f|%.1f|%.1f|%.1f|%.2f|%.2f|%d\n",
                    slot,
                    isnan(id(addon_data)[slot][0])?-1.f:id(addon_data)[slot][0],
                    isnan(id(addon_data)[slot][1])?-99.f:id(addon_data)[slot][1],
                    isnan(id(addon_data)[slot][2])?-1.f:id(addon_data)[slot][2],
                    isnan(id(addon_data)[slot][3])?-99.f:id(addon_data)[slot][3],
                    isnan(id(addon_data)[slot][4])?-1.f:id(addon_data)[slot][4],
                    isnan(id(addon_data)[slot][5])?-1.f:id(addon_data)[slot][5],
                    id(addon_alarms)[slot]
                  );
                }
                id(uart_rs485).write_array((uint8_t*)fwd, strlen(fwd));
                id(uart_rs485).flush();
                delay(3);
                id(rs485_de).turn_off();
              }

              // ════════════════════════════════════
              // Sensor Node Daten
              // ════════════════════════════════════
              else if (buf.substr(0,4) == "LUX:") {
                float lux,eco2,tvoc,aht_t,aht_h,ds1,ds2;
                if (sscanf(buf.c_str(),
                  "LUX:%f,ECO2:%f,TVOC:%f,AHT_T:%f,AHT_H:%f,DS1:%f,DS2:%f",
                  &lux,&eco2,&tvoc,&aht_t,&aht_h,&ds1,&ds2) == 7) {
                  id(remote_lux).publish_state(lux>=0?lux:NAN);
                  id(remote_eco2).publish_state(eco2>=0?eco2:NAN);
                  id(remote_tvoc).publish_state(tvoc>=0?tvoc:NAN);
                  id(remote_aht_temp).publish_state(aht_t>-50?aht_t:NAN);
                  id(remote_aht_hum).publish_state(aht_h>=0?aht_h:NAN);
                  id(remote_ds1).publish_state(ds1>-50?ds1:NAN);
                  id(remote_ds2).publish_state(ds2>-50?ds2:NAN);
                }
              }

              buf.clear();
            } else if (c >= 32 && buf.length() < 320) {
              buf += c;
            }
          }

  # ── Addon Timeout + Availability ───────────────────────────────────────────
  - interval: 10s
    then:
      - lambda: |-
          uint32_t now = millis();
          const uint32_t TIMEOUT_OFFLINE = 30000; // 30s → unavailable

          for (int s = 1; s <= 3; s++) {
            if (!id(slot_occupied)[s]) continue;

            if ((now - id(addon_last_seen)[s]) > TIMEOUT_OFFLINE) {
              if (id(addon_online)[s]) {
                id(addon_online)[s] = false;
                // MQTT Availability → offline → HA zeigt "unavailable"
                char avail[48];
                snprintf(avail, sizeof(avail), "gc/slot%d/availability", s);
                id(mqtt_client).publish(avail, "offline", 0, true);
                ESP_LOGW("addon", "Slot %d offline (Timeout 30s)", s);
              }
            }
          }

          // Übersicht aktualisieren
          char ov[96];
          snprintf(ov, sizeof(ov), "1:%s|%s 2:%s|%s 3:%s|%s",
            id(addon_type)[1].empty()?"---":id(addon_type)[1].c_str(),
            id(addon_online)[1]?"ON":"OFF",
            id(addon_type)[2].empty()?"---":id(addon_type)[2].c_str(),
            id(addon_online)[2]?"ON":"OFF",
            id(addon_type)[3].empty()?"---":id(addon_type)[3].c_str(),
            id(addon_online)[3]?"ON":"OFF");
          id(ts_addon_overview).publish_state(std::string(ov));

  # ── ADDONS-Frame an Sensor Node (alle 5s) ─────────────────────────────────
  - interval: 5s
    then:
      - lambda: |-
          char frame[256];
          snprintf(frame, sizeof(frame),
            "ADDONS:1=%s|%s,2=%s|%s,3=%s|%s\n",
            id(addon_type)[1].empty()?"---":id(addon_type)[1].c_str(),
            id(addon_online)[1]?"ON":"OFF",
            id(addon_type)[2].empty()?"---":id(addon_type)[2].c_str(),
            id(addon_online)[2]?"ON":"OFF",
            id(addon_type)[3].empty()?"---":id(addon_type)[3].c_str(),
            id(addon_online)[3]?"ON":"OFF"
          );
          id(rs485_de).turn_on();
          delay(3);
          id(uart_rs485).write_array((uint8_t*)frame, strlen(frame));
          id(uart_rs485).flush();
          delay(3);
          id(rs485_de).turn_off();
